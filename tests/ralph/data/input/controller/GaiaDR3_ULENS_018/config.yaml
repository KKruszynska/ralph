event_name: GaiaDR3_ULENS_018
ra: 271.1194
dec: -29.8162

lc_analyst:
    acceptable_mag_range:
      upper_limit: -10.0
      lower_limit: 30.0

fit_analyst:
    ongoing_magnification_thershold: 1.10
    ongoing_amplitude_thershold: 1.0
    model_fit_configuration:
      PSPL_no_blend_no_piE:
        fitting_package: pyLIMA
        fitting_method: DE
        fitting_method_args:
          DE_population: 10
          loss_function: soft_l1
        boundaries:
          u0: [0.0, 2.0]
      PSPL_blend_no_piE:
        fitting_package: pyLIMA
        fitting_method: TRF
        boundaries:
          u0: [0.0, 2.0]
      PSPL_blend_piE:
        fitting_package: pyLIMA
        fitting_method: TRF
        boundaries:
          u0: [-2.0, 2.0]
          piEN: [-1.0, 1.0]
          piEE: [-1.0, 1.0]
      PSPL_no_blend_piE:
        fitting_package: pyLIMA
        fitting_method: TRF
        boundaries:
          u0: [-2.0, 2.0]
          piEN: [-1.0, 1.0]
          piEE: [-1.0, 1.0]

light_curves:
    - survey: Gaia
      band: G
      ephemeris: tests/ralph/data/input/ephemeris/gaia_jpl_horizons_results.txt
      path: tests/ralph/data/input/light_curves/GaiaDR3_ULENS_018_Gaia_G.dat

    - survey: Gaia
      band: BP
      ephemeris: tests/ralph/data/input/ephemeris/gaia_jpl_horizons_results.txt
      path: tests/ralph/data/input/light_curves/GaiaDR3_ULENS_018_Gaia_BP.dat

    - survey: Gaia
      band: RP
      ephemeris: tests/ralph/data/input/ephemeris/gaia_jpl_horizons_results.txt
      path: tests/ralph/data/input/light_curves/GaiaDR3_ULENS_018_Gaia_RP.dat

    - survey: OGLE
      band: I
      path: tests/ralph/data/input/light_curves/OGLE_2016_BLG_1396_I.dat

    - survey: KMTNet_A
      band: I
      path: tests/ralph/data/input/light_curves/KMT_2016_BLG_0738_KMTA_I.dat

    - survey: KMTNet_C
      band: I
      path: tests/ralph/data/input/light_curves/KMT_2016_BLG_0738_KMTC_I.dat

    - survey: KMTNet_S
      band: I
      path: tests/ralph/data/input/light_curves/KMT_2016_BLG_0738_KMTS_I.dat
